name: Crypto tests (plain Linux)

on:
  push:
    # Skip tag pushes: the Release workflow calls this via workflow_call, so a
    # tag push would otherwise run these tests twice.
    tags-ignore:
      - '**'
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sanitizer: [none, asan-ubsan]
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Configure
        run: |
          if [ "${{ matrix.sanitizer }}" = "asan-ubsan" ]; then
            export CXXFLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g"
            export CFLAGS="$CXXFLAGS"
            export LDFLAGS="-fsanitize=address,undefined"
          fi
          cmake -B build -DBUILD_APP=OFF

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure
