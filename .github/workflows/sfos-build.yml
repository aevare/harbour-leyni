name: SFOS RPM build

# PR-only: mainline RPMs are built and published by the tag-driven Release
# workflow (.github/workflows/release.yml), so there is no separate build on
# push — this avoids a redundant SFOS build when a release tag is pushed
# alongside main.
on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      # Releases must match existing coderus/sailfishos-platform-sdk Docker
      # tags (the action uses the release string as the image tag):
      # https://hub.docker.com/r/coderus/sailfishos-platform-sdk/tags
      matrix:
        release:
          - 4.6.0.13
          - 5.0.0.43
        arch:
          - armv7hl
          - aarch64
    steps:
      - uses: actions/checkout@v5

      - name: Build RPM
        uses: CODeRUS/github-sfos-build@master
        with:
          release: ${{ matrix.release }}
          arch: ${{ matrix.arch }}

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v5
        with:
          name: rpm-${{ matrix.release }}-${{ matrix.arch }}
          path: |
            RPMS/*.rpm
            RPMS/**/*.rpm
