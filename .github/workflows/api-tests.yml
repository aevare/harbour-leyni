name: API tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Started explicitly rather than as a `services:` container: the
      # service path gates the whole job on the image's own healthcheck
      # (which failed opaquely in "Initialize containers"); this way the
      # wait condition and the logs are ours.
      - name: Start Vaultwarden
        run: |
          # Volatile storage is intentional in CI: every run gets a fresh
          # instance; newer Vaultwarden requires the explicit opt-in flag.
          docker run -d --name vaultwarden \
            -e SIGNUPS_ALLOWED=true \
            -e I_REALLY_WANT_VOLATILE_STORAGE=true \
            -p 8000:80 vaultwarden/server:latest
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/alive > /dev/null; then exit 0; fi
            sleep 2
          done
          echo "Vaultwarden did not become ready:"
          docker logs vaultwarden
          exit 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev qtbase5-dev

      - name: Configure
        run: cmake -B build -DBUILD_APP=OFF -DBUILD_API=ON

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Unit tests
        run: ctest --test-dir build -LE integration --output-on-failure

      - name: Integration tests (against local Vaultwarden)
        env:
          BITVAULT_TEST_SERVER: http://127.0.0.1:8000
        run: ctest --test-dir build -L integration --output-on-failure

      - name: Vaultwarden logs (on failure)
        if: failure()
        run: docker logs vaultwarden || true
